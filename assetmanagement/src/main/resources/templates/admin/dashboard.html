<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | AssetCentral</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/css/admin/admin.css}">
</head>


<body>
<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo-area">
            <div style="display:flex;">
                <div class="logo-placeholder"><i class="fas fa-cube" style="color: white;"></i></div>
            </div>
            <div class="panel-title" >Admin Panel</div>
        </div>
        <ul class="nav-links">
            <li><a href="/admin/dashboard" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/add-asset"><i class="fas fa-plus"></i> Add Asset</a></li>
            <!--<li><a href="/admin/assets"><i class="fas fa-box"></i> Manage Assets</a></li>-->
            <li><a href="/admin/view-users"><i class="fas fa-users"></i> View Users</a></li>
            <li><a href="/admin/add-user"><i class="fas fa-user-plus"></i> Add User</a></li>
            <li><a href="/admin/search-user"><i class="fas fa-search"></i> Search User</a></li>
            <li><a href="/admin/issues"><i class="fas fa-ticket-alt"></i> View Issues</a></li>
            <li><a href="/admin/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/login" class="logout-link"><i class="fas fa-sign-out-alt"></i>Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <h2 style="margin: 0; font-size: 20px; font-weight: 700;">Welcome Admin!</h2>

            <div class="top-bar-right">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="assetSearch" placeholder="Filter assets..." onkeyup="filterTable()">
                </div>

                <div class="circle-profile"
                     th:text="${user != null and user.name != null} ? ${user.name.substring(0,1)} : 'A'"
                     title="View Profile"
                     onclick="window.location.href='/admin/profile'"
                     style="cursor:pointer;">
                    A
                </div>
            </div>
        </header>

        <div class="content-area" >
            <h2 style="margin-bottom: 25px;margin-top:1px; font-weight: 800; font-size: 28px;">Assets Overview</h2>
            <section class="stats-grid">
                <div class="stat-card total">
                    <div class="card-header">
                        <span>Total Assets</span>
                        <i class="fas fa-boxes"></i>
                    </div>
                    <h3 th:text="${#lists.size(assets)}">0</h3>
                    <p class="card-subtitle">Registered in system</p>
                </div>

                <div class="stat-card users">
                    <div class="card-header">
                        <span>System Users</span>
                        <i class="fas fa-users"></i>
                    </div>
                    <h3 th:text="${userCount}">0</h3>
                    <p class="card-subtitle">Active accounts</p>
                </div>
<!--
                <div class="stat-card issues">
                    <div class="card-header">
                        <span>Open Issues</span>
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h3 th:text="${userCount}">0</h3>
                    <p class="card-subtitle">Requiring attention</p>
                </div>-->
            </section>
            <div class="table-card">
                <table class="styled-table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>ASSET NAME</th>
                        <th>USER ID</th>
                        <th>ASSIGNED TO</th>
                        <th>ACTION</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a, stat : ${assets}">
                        <td th:text="${stat.count}" style="color: var(--text-muted); font-weight: 600;"></td>
                        <td th:text="${a.name}" style="font-weight: 700;"></td>
                        <td th:text="${a.serialNumber}" style="font-family: monospace; color: var(--text-muted);font-weight: bold;font-size:16px;"></td>
                        <td><span class="badge" th:text="${a.assignedTo}"></span></td>
                        <td>
                            <a th:href="@{'/admin/edit-asset/' + ${a.id}}" class="action-btn edit-btn">
                                 Edit
                            </a>
                            <a th:href="@{'/admin/delete-asset/' + ${a.id}}" class="action-btn delete-btn" onclick="return confirm('Delete?')">
                                 Delete
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    function filterTable() {
        const input = document.getElementById("assetSearch");
        const filter = input.value.toLowerCase();
        const table = document.querySelector(".styled-table");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            const row = tr[i];
            row.style.display = row.textContent.toLowerCase().includes(filter) ? "" : "none";
        }
    }
</script>
</body>
</html>
