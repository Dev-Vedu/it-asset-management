<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #000000; /* Pure Black Sidebar */
            --primary-purple: #6d28d9; /* Deep Purple */
            --light-purple: #f5f3ff;
            --bg-body: #ffffff; /* White Dashboard Background */
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR (BLACK) --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            padding: 0 30px 30px;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .logo i { color: var(--primary-purple); }

        .nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; }

        .nav-links li a {
            color: #9ca3af;
            text-decoration: none;
            padding: 14px 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-links li a:hover, .nav-links li a.active {
            background: #111111;
            color: white;
            border-left: 4px solid var(--primary-purple);
        }

        .nav-links li a.active i { color: var(--primary-purple); }

        .sidebar-footer { padding: 20px 30px; border-top: 1px solid #222; }
        .logout-link { color: #9ca3af; text-decoration: none; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .logout-link:hover { color: var(--primary-purple); }

        /* --- MAIN CONTENT AREA (WHITE) --- */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
            background: white;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .header-left h2 { margin: 0; font-weight: 800; font-size: 28px; }
        .header-left p { margin: 5px 0 0; color: var(--text-muted); }

        /* --- SEARCH BOX --- */
        .search-container {
            position: relative;
            width: 300px;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-container input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: #f9fafb;
            outline: none;
            transition: 0.3s;
        }

        .search-container input:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1);
            background: white;
        }

        /* --- STAT CARDS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            transition: transform 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); }
        .stat-card span { color: var(--text-muted); font-size: 14px; font-weight: 600; }
        .stat-card h3 { margin: 10px 0 0; font-size: 32px; font-weight: 700; color: var(--primary-purple); }

        /* --- TABLE --- */
        .table-wrapper {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
        }

        .styled-table { width: 100%; border-collapse: collapse; }
        .styled-table th {
            background: #fafafa;
            color: var(--text-main);
            font-weight: 700;
            font-size: 13px;
            padding: 20px 24px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
        }

        .styled-table td { padding: 20px 24px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .styled-table tbody tr:hover { background-color: var(--light-purple); }

        .asset-name { font-weight: 600; color: #000; }
        .badge {
            background: var(--light-purple);
            color: var(--primary-purple);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
        }

    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo"><i class="fas fa-cube"></i> Admin Panel</div>
        <ul class="nav-links">
            <li><a href="/admin/dashboard" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/add-asset"><i class="fas fa-plus"></i> Add Asset</a></li>
            <li><a href="/admin/add-user"><i class="fas fa-user-plus"></i> Add User</a></li>
            <li><a href="/admin/search-user"><i class="fas fa-search"></i> Search User</a></li>
            <li><a href="/admin/issues"><i class="fas fa-ticket-alt"></i> View Issues</a></li>
            <li><a href="/admin/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="dashboard-header">
            <div class="header-left">
                <h2>Overview</h2>
                <p>You have <span th:text="${#lists.size(assets)}" style="color: var(--primary-purple); font-weight: 600;">0</span> total assets in system.</p>
            </div>

            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="assetSearch" placeholder="Filter assets..." onkeyup="filterTable()">
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <span>Total Assets</span>
                <h3 th:text="${#lists.size(assets)}">0</h3>
            </div>
            <div class="stat-card">
                <span>Assigned</span>
                <h3>2</h3>
            </div>
            <div class="stat-card">
                <span>Issues</span>
                <h3>0</h3>
            </div>
        </section>

        <section class="content-body">
            <div class="table-wrapper">
                <table class="styled-table">
                    <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>Asset Name</th>
                        <th>Serial Number</th>
                        <th>Assigned To</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a, stat : ${assets}">
                        <td style="color: var(--text-muted);" th:text="${stat.count}">1</td>
                        <td><span class="asset-name" th:text="${a.name}">Asset Name</span></td>
                        <td><span th:text="${a.serialNumber}">00000</span></td>
                        <td><span class="badge" th:text="${a.assignedTo}">User</span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(assets)}">
                        <td colspan="4" style="text-align: center; padding: 60px; color: var(--text-muted);">
                            No assets found.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script>
    function filterTable() {
        const input = document.getElementById("assetSearch");
        const filter = input.value.toLowerCase();
        const table = document.querySelector(".styled-table");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            const row = tr[i];
            if (row.textContent.toLowerCase().includes(filter)) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        }
    }
</script>

</body>
</html>
