<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | AssetPro</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0b0e14;
            --primary: #6d28d9;
            --accent: #a855f7;
            --bg-body: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            height: 100%;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 0;
        }

        .logo-area { padding: 0 25px 40px; }

        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-title { font-size: 20px; font-weight: 800; }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .nav-links li a {
            color: #94a3b8;
            text-decoration: none;
            padding: 12px 25px;
            margin: 4px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            font-weight: 600;
        }

        .nav-links li a:hover {
            background:#252525;
            color:white;
        }

        .nav-links li a.active {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 20px 25px;
        }

        .logout-link {
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            gap: 10px;
        }

        .logout-link:hover { color: red; }

        /* MAIN */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-bar {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid var(--border-color);
            background: #F3E8FF;
        }

        .content-area {
            flex-grow: 1;
            padding: 40px 50px;
            overflow-y: auto;
        }

        .table-card {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
        }

        .styled-table th {
            background: #fafafa;
            padding: 20px;
        }

        .styled-table td {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .badge {
            background: #f5f3ff;
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }

        .edit-btn { background: #3b82f6; color: white; }
        .delete-btn { background: #ef4444; color: white; }
    </style>
</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-placeholder">
                <i class="fas fa-cube" style="color: white;"></i>
            </div>
            <div class="panel-title">Admin Panel</div>
        </div>

        <ul class="nav-links">
            <li><a href="/admin/dashboard" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a></li>

            <li><a href="/admin/assets"><i class="fas fa-box"></i> Manage Assets</a></li> <!-- ✅ ADDED HERE -->

            <li><a href="/admin/add-asset"><i class="fas fa-plus"></i> Add Asset</a></li>
            <li><a href="/admin/add-user"><i class="fas fa-user-plus"></i> Add User</a></li>
            <li><a href="/admin/search-user"><i class="fas fa-search"></i> Search User</a></li>
            <li><a href="/admin/issues"><i class="fas fa-ticket-alt"></i> View Issues</a></li>
            <li><a href="/admin/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="/login" class="logout-link">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </nav>

    <!-- MAIN -->
    <main class="main-content">

        <header class="top-bar">
            <h2>Welcome Admin!</h2>
        </header>

        <div class="content-area">

            <h2>Assets</h2>

            <div class="table-card">
                <table class="styled-table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Serial</th>
                        <th>Assigned</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="a, stat : ${assets}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${a.name}"></td>
                        <td th:text="${a.serialNumber}"></td>
                        <td th:text="${a.assignedTo}"></td>

                        <td>
                            <a th:href="@{'/admin/edit-asset/' + ${a.id}}" class="action-btn edit-btn">Edit</a>

                            <a th:href="@{'/admin/delete-asset/' + ${a.id}}"
                               class="action-btn delete-btn"
                               onclick="return confirm('Delete?')">Delete</a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </main>

</div>

</body>
</html>
