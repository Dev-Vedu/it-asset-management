<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | AssetPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0b0e14;
            --primary: #6d28d9;
            --bg-body: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
        }

        html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); }
        .dashboard-container { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100%; color: white; display: flex; flex-direction: column; padding: 30px 0; flex-shrink: 0; }
        .logo-area { padding: 0 25px 40px; display: flex; align-items: center; gap: 12px; }
        .logo-placeholder { width: 40px; height: 40px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .panel-title { font-size: 20px; font-weight: 800; }
        .nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .nav-links li a { color: #94a3b8; text-decoration: none; padding: 12px 25px; margin: 4px 15px; display: flex; align-items: center; gap: 12px; border-radius: 12px; font-weight: 600; }
        .nav-links li a:hover { background:#252525; color:white; }
        .nav-links li a.active { background: rgba(255,255,255,0.05); color: white; }
        .sidebar-footer { margin-top: auto; padding: 20px 25px; }
        .logout-link { color: #94a3b8; text-decoration: none; display: flex; gap: 10px; }
        .logout-link:hover { color: #ef4444; }

        /* MAIN */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; }

        /* TOP BAR */
        .top-bar {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid var(--border-color);
            background: #F3E8FF;
        }

        .search-container { position: relative; width: 300px; }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-container input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            outline: none;
            font-family: inherit;
            box-sizing: border-box;
        }

        .content-area { flex-grow: 1; padding: 40px 50px; overflow-y: auto; }

        /* REFINED TABLE LAYOUT */
        .table-card { background: white; border-radius: 20px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }

        .styled-table { width: 100%; border-collapse: collapse; table-layout: auto; } /* Auto layout allows column spacing to breathe */

        .styled-table th, .styled-table td { padding: 18px 25px; }

        /* Proportional widths for a balanced look */
        .styled-table th:nth-child(1) { width: 50px; }    /* # */
        .styled-table th:nth-child(2) { width: 30%; }     /* Name */
        .styled-table th:nth-child(3) { width: 25%; }     /* Serial */
        .styled-table th:nth-child(4) { width: 15%; text-align: center; } /* Assigned To */
        .styled-table th:nth-child(5) { width: 25%; text-align: center; } /* Action */

        .styled-table th { background: #fafafa; text-align: left; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }

        .styled-table td { border-bottom: 1px solid var(--border-color); font-size: 14px; color: var(--text-main); vertical-align: middle; }

        .styled-table td:nth-child(4), .styled-table td:nth-child(5) { text-align: center; }

        .badge { background: #f5f3ff; color: var(--primary); padding: 6px 12px; border-radius: 8px; font-weight: 700; display: inline-block; }

        /* ACTIONS */
        .action-btn { padding: 8px 14px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: 700; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .edit-btn { background: #eef2ff; color: #4f46e5; margin-right: 5px; }
        .delete-btn { background: #fef2f2; color: #ef4444; }
        .edit-btn:hover { background: #4f46e5; color: white; }
        .delete-btn:hover { background: #ef4444; color: white; }
    </style>
</head>

<body>
<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-placeholder"><i class="fas fa-cube" style="color: white;"></i></div>
            <div class="panel-title">Admin Panel</div>
        </div>
        <ul class="nav-links">
            <li><a href="/admin/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/add-asset"><i class="fas fa-plus"></i> Add Asset</a></li>
            <li><a href="/admin/assets" class="active"><i class="fas fa-box"></i> Manage Assets</a></li>
            <li><a href="/admin/add-user"><i class="fas fa-user-plus"></i> Add User</a></li>
            <li><a href="/admin/search-user"><i class="fas fa-search"></i> Search User</a></li>
            <li><a href="/admin/issues"><i class="fas fa-ticket-alt"></i> View Issues</a></li>
            <li><a href="/admin/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/login" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <h2 style="margin: 0; font-size: 20px; font-weight: 700;">Welcome Admin!</h2>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="assetSearch" placeholder="Filter assets..." onkeyup="filterTable()">
            </div>
        </header>

        <div class="content-area">
            <h2 style="margin-bottom: 25px; font-weight: 800; font-size: 28px;">Assets Overview</h2>
            <div class="table-card">
                <table class="styled-table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Serial</th>
                        <th>Assigned To</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a, stat : ${assets}">
                        <td th:text="${stat.count}" style="color: var(--text-muted); font-weight: 600;"></td>
                        <td th:text="${a.name}" style="font-weight: 700;"></td>
                        <td th:text="${a.serialNumber}" style="font-family: monospace; color: var(--text-muted);"></td>
                        <td><span class="badge" th:text="${a.assignedTo}"></span></td>
                        <td>
                            <a th:href="@{'/admin/edit-asset/' + ${a.id}}" class="action-btn edit-btn">
                                 Edit
                            </a>
                            <a th:href="@{'/admin/delete-asset/' + ${a.id}}" class="action-btn delete-btn" onclick="return confirm('Delete?')">
                                 Delete
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    function filterTable() {
        const input = document.getElementById("assetSearch");
        const filter = input.value.toLowerCase();
        const table = document.querySelector(".styled-table");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            const row = tr[i];
            row.style.display = row.textContent.toLowerCase().includes(filter) ? "" : "none";
        }
    }
</script>
</body>
</html>
