<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>

    <style>
        body{
        font-family:Arial;
        background:#f8fafc;
        padding:40px;
        }

        .card{
        max-width:500px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:12px;
        box-shadow:0 10px 20px rgba(0,0,0,.08);
        }

        input,select{
        width:100%;
        padding:12px;
        margin-bottom:15px;
        }

        button{
        padding:12px 20px;
        background:#6d28d9;
        color:white;
        border:none;
        cursor:pointer;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Edit User</h2>

    <form action="/admin/update-user" method="post">

        <input type="hidden" name="id" th:value="${user.id}">

        <input type="text" name="employeeId" th:value="${user.employeeId}" placeholder="User ID">

        <input type="text" name="name" th:value="${user.name}" placeholder="Name">

        <input type="email" name="email" th:value="${user.email}" placeholder="Email">

        <input type="text" name="password" th:value="${user.password}" placeholder="Password">

        <select name="role">
            <option value="EMPLOYEE">EMPLOYEE</option>
            <option value="WORKER">WORKER</option>
            <option value="ADMIN">ADMIN</option>
        </select>

        <button type="submit">Update User</button>

    </form>

</div>

</body>
</html>
