<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User | AssetCentral</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0b0e14;
            --primary: #6d28d9;
            --accent: #a855f7;
            --bg-body: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
        }

        html, body {
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
        }

        .dashboard-container { display: flex; height: 100vh; width: 100vw; }

        /* --- SIDEBAR (Consistent with Dashboard) --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg);
            height: 100%; color: white;
            display: flex; flex-direction: column; flex-shrink: 0;
        }

        .logo-area { padding: 25px 25px 15px 25px; }
        .brand-content {
            font-size: 24px; display: flex; align-items: center;
            background: linear-gradient(135deg, #ffffff 30%, #a855f7 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-icon { margin-right: 10px; font-size: 22px; -webkit-text-fill-color: transparent; }
        .brand-text { font-weight: 800; letter-spacing: -1.2px; }

        .nav-links { list-style: none; padding: 0; margin: 20px 0; flex-grow: 1; }
        .nav-links li a {
            color: #94a3b8; text-decoration: none;
            padding: 12px 25px; margin: 4px 15px;
            display: flex; align-items: center; gap: 12px;
            border-radius: 12px; font-weight: 600; transition: 0.3s;
        }
        .nav-links li a:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-links li a.active { background: rgba(255, 255, 255, 0.05); color: white; }

        /* --- MAIN CONTENT --- */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar {
            height: 80px; display: flex; align-items: center;
            padding: 0 50px; border-bottom: 1px solid var(--border-color);
            background: white;
        }

        .content-area { flex-grow: 1; padding: 40px 50px; overflow-y: auto; display: flex; justify-content: center; }

        /* --- FORM CARD --- */
        .form-card {
            background: white;
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            height: fit-content;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 20px; }
        label {
            display: block; font-size: 13px; font-weight: 700;
            color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase;
        }

        input, select {
            width: 100%; padding: 12px 16px;
            border-radius: 12px; border: 1px solid var(--border-color);
            background: #f9fafb; font-family: inherit; font-size: 15px;
            box-sizing: border-box; transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none; border-color: var(--primary); background: white;
            box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1);
        }

        .btn-update {
            width: 100%; padding: 14px;
            background: var(--primary); color: white;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }

        .btn-update:hover { background: var(--accent); transform: translateY(-2px); }

        .back-link {
            display: block; text-align: center; margin-top: 20px;
            text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 14px;
        }
        .back-link:hover { color: var(--primary); }

        .sidebar-footer { padding: 20px 25px; border-top: 1px solid rgba(255,255,255,0.05); }
        .logout-link { color: #94a3b8; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .logout-link:hover { color: var(--danger); }

    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo-area">
            <div class="brand-content">
                <i class="fa-solid fa-box-open brand-icon"></i>
                <span class="brand-text">AssetCentral</span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="/admin/dashboard" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/add-asset"><i class="fas fa-plus"></i> Add Asset</a></li>
            <!--<li><a href="/admin/assets"><i class="fas fa-box"></i> Manage Assets</a></li>-->
            <li><a href="/admin/view-users"><i class="fas fa-users"></i> View Users</a></li>
            <li><a href="/admin/add-user"><i class="fas fa-user-plus"></i> Add User</a></li>
            <li><a href="/admin/search-user"><i class="fas fa-search"></i> Search User</a></li>
            <li><a href="/admin/issues"><i class="fas fa-ticket-alt"></i> View Issues</a></li>
            <li><a href="/admin/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/login" class="logout-link"><i class="fas fa-sign-out-alt"></i>Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div style="font-weight: 700; font-size: 18px;">Edit Account Details</div>
        </header>

        <div class="content-area">
            <div class="form-card">
                <div style="margin-bottom: 30px;">
                    <h2 style="margin: 0; font-size: 24px; font-weight: 800;">Modify User</h2>
                    <p style="color: var(--text-muted); margin: 5px 0 0;">Update information for <span th:text="${user.name}" style="color: var(--primary);">User</span></p>
                </div>

                <form action="/admin/update-user" method="post">
                    <input type="hidden" name="id" th:value="${user.id}">

                    <div class="form-group">
                        <label>Employee ID</label>
                        <input type="text" name="employeeId" th:value="${user.employeeId}" placeholder="e.g. EMP101" required>
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="name" th:value="${user.name}" placeholder="Enter full name" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" th:value="${user.email}" placeholder="email@company.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="text" name="password" th:value="${user.password}" placeholder="Update password">
                    </div>

                    <div class="form-group">
                        <label>Access Role</label>
                        <select name="role">
                            <option value="EMPLOYEE" th:selected="${user.role == 'EMPLOYEE'}">EMPLOYEE</option>
                            <option value="WORKER" th:selected="${user.role == 'WORKER'}">WORKER</option>
                            <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-update">Save Changes</button>

                    <a href="/admin/view-users" class="back-link">Cancel and return</a>
                </form>
            </div>
        </div>
    </main>
</div>

</body>
</html>
