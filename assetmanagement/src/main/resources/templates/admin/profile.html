<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.12) 0px, transparent 50%);
            background-color: #f8fafc;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 400px;
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
        }

        h2 { margin: 0 0 0.5rem 0; font-size: 1.6rem; color: var(--text-main); font-weight: 800; }

        .role-badge {
            display: inline-block;
            background: #e0e7ff;
            color: #4338ca;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .info-box {
            background: rgba(241, 245, 249, 0.5);
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            text-align: left;
            border: 1px solid #e2e8f0;
        }

        /* FIXED: Changed to column layout to show values below titles */
        .info-item {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.2rem;
        }

        .info-item:last-child { margin-bottom: 0; }

        .label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .value { color: var(--text-main); font-weight: 600; font-size: 1rem; }

        .actions { display: flex; gap: 1rem; justify-content: center; }
        .actions a {
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.7rem 1.4rem;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-back { background: #f1f5f9; color: var(--text-main); }
        .btn-logout { background: #fef2f2; color: #ef4444; }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="avatar" th:text="${user != null and user.name != null} ? ${user.name.substring(0,1)} : 'A'">A</div>

    <h2 th:text="${user != null} ? ${user.name} : 'Admin Profile'">Admin Profile</h2>
    <div class="role-badge">ADMINISTRATOR</div>

    <div class="info-box">
        <div class="info-item">
            <span class="label">Email Address:</span>
            <span class="value" th:text="${user != null} ? ${user.email} : 'admin@gmail.com'">admin@gmail.com</span>
        </div>
        <div class="info-item">
            <span class="label">System Status:</span>
            <span class="value" style="color: #10b981;">● Active</span>
        </div>
    </div>

    <div class="actions">
        <a href="/admin/dashboard" class="btn-back">&larr; Back</a>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>
</div>

</body>
</html>
