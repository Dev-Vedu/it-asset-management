<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --accent: #a855f7;
            --bg-lavender: #F3E8FF;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-lavender);
        }

        /* Main Content Box with Black Border */
        .profile-card {
            background: #ffffff;
            width: 90%;
            max-width: 400px;
            padding: 4rem 2.5rem;
            border-radius: 35px;
            border: 2px solid #000000;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.05);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 800;
            border: 2px solid #000000;
            text-transform: uppercase;
        }

        h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.8rem;
            color: #000000;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .role-badge {
            display: inline-block;
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid #000000;
        }

        .info-box {
            background: #f8fafc;
            padding: 1.8rem;
            border-radius: 24px;
            margin-bottom: 2.5rem;
            text-align: left;
            border: 2px solid #000000;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.2rem;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .label {
            font-weight: 800;
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.05em;
        }

        .value {
            color: #000000;
            font-weight: 700;
            font-size: 1rem;
            word-break: break-all;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
        }

        .actions a {
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0.9rem 1.8rem;
            border-radius: 14px;
            transition: 0.3s;
            flex: 1;
            text-align: center;
        }

        .btn-back {
            background: #f1f5f9;
            color: #000000;
            border: 2px solid #000000;
        }

        .btn-back:hover {
            background: #e2e8f0;
            transform: translateX(-5px);
        }

        .btn-logout {
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
        }

        .btn-logout:hover {
            transform: scale(1.05);
            background: #222222;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="avatar"
         th:text="${user != null and user.name != null and !user.name.isEmpty()} ? ${user.name.substring(0,1)} : 'A'">
        A
    </div>

    <h2 th:text="${user != null and user.name != null} ? ${user.name} : 'Admin Profile'">
        Admin Profile
    </h2>

    <div class="role-badge">ADMINISTRATOR</div>

    <div class="info-box">
        <div class="info-item">
            <span class="label">Email Address:</span>
            <span class="value"
                  th:text="${user != null and user.email != null} ? ${user.email} : 'admin@system.com'">
                admin@gmail.com
            </span>
        </div>
        <div class="info-item">
            <span class="label">System Status:</span>
            <span class="value" style="color: #10b981;">● Active</span>
        </div>
    </div>

    <div class="actions">
        <a href="/admin/dashboard" class="btn-back">← Back</a>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>
</div>

</body>
</html>
