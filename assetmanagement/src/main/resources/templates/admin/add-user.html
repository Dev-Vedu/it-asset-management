<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add User | AssetCentral</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0b0e14;
            --primary: #6d28d9;
            --accent: #a855f7;
            --bg-body: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            height: 100%;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 0;
            flex-shrink: 0;
        }

        .logo-area { padding: 0 25px 20px; }
        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .panel-title { font-size: 20px; font-weight: 800; color: white; }

        .nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .nav-links li a {
            color: #94a3b8;
            text-decoration: none;
            padding: 12px 25px;
            margin: 4px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: 0.3s;
        }

        .nav-links li a:hover { background: #252525; color: white; }
        .nav-links li a.active { background: rgba(255, 255, 255, 0.05); color: white; }

.sidebar-footer {
    margin-top: auto;
    padding: 10px 10px;
    border-top: 1px solid rgba(255,255,255,0.05);

}


   .logout-link {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .logout-link:hover { color: #ef4444; }


        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }

        .top-bar {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid var(--border-color);
            background: white;
            flex-shrink: 0;
        }

        /* --- FORM CARD --- */
        .content-area {
            padding: 40px 50px;
            display: flex;
            justify-content: center;
        }

        .form-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            width: 100%;
            max-width: 600px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-card h2 { margin: 0 0 8px 0; font-size: 26px; font-weight: 800; color: var(--text-main); }
        .form-card p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: #f9fafb;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1);
        }

        .btn-submit {
            grid-column: span 2;
            background: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #5b21b6;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(109, 40, 217, 0.2);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        .back-link:hover { color: var(--primary); }

        /* Container for the whole logo section */
.logo-area {
    padding: 25px 25px 15px 25px;
}

.brand-container {
    display: flex;
    align-items: center;
    gap: 12px;
}

.brand-content {
    font-size: 24px;
    display: flex;
    align-items: center;
    /* The Gradient Magic */
    background: linear-gradient(135deg, #ffffff 30%, #a855f7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.brand-icon {
    margin-right: 10px;
    font-size: 22px;
    /* Ensures the icon also takes the gradient */
    -webkit-text-fill-color: transparent;
}

.brand-text {
    font-weight: 800;
    letter-spacing: -1.2px;
    margin-bottom: 10px;
}

/* Subtitle "Admin Panel" Styles */
.panel-subtitle-container {
    font-size: 15px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0.8;
}

.line-accent {
    width: 20px;
    height: 1px;
    background: #7c3aed;
}

.subtitle-text {
    white-space: nowrap;
}
    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo-area">
            <div class="brand-container">
                <div class="brand-content">
                    <i class="fa-solid fa-box-open brand-icon"></i>
                    <span class="brand-text">AssetCentral</span>
                </div>
            </div>

            <div class="panel-subtitle-container">
                <span class="line-accent"></span>
                <span class="subtitle-text">Admin Panel</span>
                <span class="line-accent"></span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="/admin/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <!--<li><a href="/admin/assets" ><i class="fas fa-box"></i> Manage Assets</a></li>-->
            <li><a href="/admin/add-asset"><i class="fas fa-plus"></i> Add Asset</a></li>
            <li><a href="/admin/view-users"><i class="fas fa-users"></i> View Users</a></li>

            <li><a href="/admin/add-user" class="active"><i class="fas fa-user-plus"></i> Add User</a></li>
            <li><a href="/admin/search-user"><i class="fas fa-search"></i> Search User</a></li>
            <li><a href="/admin/issues"><i class="fas fa-ticket-alt"></i> View Issues</a></li>
            <li><a href="/admin/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/login" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div style="font-weight: 700; font-size: 18px;">User Management</div>
        </header>

        <div class="content-area">
            <div class="form-card">
                <h2>Create Account</h2>
                <p class="subtitle">Assign roles and credentials for new staff members.</p>

                <form action="/admin/add-user" method="post">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Full Name</label>
                            <input type="text" name="name" required placeholder="Jane Smith">
                        </div>

                        <div class="form-group full-width">
                            <label>Email Address</label>
                            <input type="email" name="email" required placeholder="jane@assetpro.com">
                        </div>

                        <div class="form-group full-width">
                            <label>Temporary Password</label>
                            <input type="password" name="password" required placeholder="••••••••">
                        </div>

                        <div class="form-group">
                            <label>Access Role</label>
                            <select name="role">
                                <option value="EMPLOYEE">Employee</option>
                                <option value="WORKER">Worker (Maintenance)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Employee ID</label>
                            <input type="text" name="employeeId" placeholder="EMP-XXX">
                        </div>

                        <div class="form-group full-width">
                            <label>Worker Specialization (Optional)</label>
                            <select name="workerType">
                                <option value="">-- No Specialization --</option>
                                <option value="HARDWARE">Hardware Tech</option>
                                <option value="SOFTWARE">Software Support</option>
                                <option value="NETWORK">Network Admin</option>
                            </select>
                        </div>

                        <button type="submit" class="btn-submit">Create User Account</button>
                    </div>
                </form>

                <a href="/admin/dashboard" class="back-link">Return to Dashboard</a>
            </div>
        </div>
    </main>
</div>

</body>
</html>
