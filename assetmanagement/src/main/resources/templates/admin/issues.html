<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Issues | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --accent: #a855f7;
            --bg-lavender: #F3E8FF;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px;
            background-color: var(--bg-lavender);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Top Navigation Header */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        h2 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .nav-actions {
            display: flex;
            gap: 15px;
        }

        .nav-actions a {
            text-decoration: none;
            color: #000000;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            border: 2px solid #000000;
            background-color: #ffffff;
        }

        .nav-actions a:hover {
            background: #000000;
            color: #ffffff;
        }

        .logout-btn {
            color: #ef4444 !important;
            border-color: #ef4444 !important;
        }

        .logout-btn:hover {
            background: #ef4444 !important;
            color: #ffffff !important;
        }

        /* Empty State with Black Border */
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--card-bg);
            border-radius: 20px;
            border: 2px solid #000000;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Issue Cards with Black Borders */
        .issue-list {
            list-style: none;
            padding: 0;
            display: grid;
            gap: 1.5rem;
        }

        .issue-card {
            background: var(--card-bg);
            padding: 1.5rem 2rem;
            border-radius: 20px;
            border: 2px solid #000000;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .issue-card:hover {
            transform: scale(1.02);
        }

        .issue-details b {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 0.5rem;
            color: #000000;
        }

        .issue-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            gap: 1.5rem;
        }

        .info-item strong {
            color: #000000;
            font-weight: 700;
        }

        /* Status & Type Badges */
        .badge {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid #000000;
        }

        .badge-type {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
        }

        .badge-status {
            background: #fef3c7;
            color: #92400e;
        }

        @media (max-width: 768px) {
            .issue-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .header-nav {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header-nav">
        <h2>Reported Issues</h2>
        <div class="nav-actions">
            <a href="/admin/dashboard">← Dashboard</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </header>

    <p th:if="${#lists.isEmpty(issues)}" class="empty-state">
        No active issues found in the system.
    </p>

    <ul class="issue-list">
        <li th:each="i : ${issues}" class="issue-card">
            <div class="issue-details">
                <b th:text="${i.description}">Issue Description</b>
                <div class="issue-info">
                    <span class="info-item">
                        <strong>User ID:</strong> <span th:text="${i.userId}">101</span>
                    </span>
                    <span class="info-item">
                        <strong>ID:</strong> <span th:text="${i.id}">#ID</span>
                    </span>
                </div>
            </div>

            <div class="issue-badges">
                <span class="badge badge-type" th:text="${i.type}">HARDWARE</span>
                <span class="badge badge-status" th:text="${i.status}">PENDING</span>
            </div>
        </li>
    </ul>
</div>

</body>
</html>
