<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Assets | AssetCentral</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0b0e14;
            --primary: #6d28d9;
            --bg-body: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
        }

        .container {
            padding: 40px 50px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h2 { font-weight: 800; font-size: 28px; margin: 0; }

        /* --- TABLE STYLING --- */
        .table-card {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
        }

        .styled-table th {
            background: #fafafa;
            padding: 18px 25px;
            text-align: left;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
        }

        .styled-table td {
            padding: 18px 25px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        /* --- BADGE & BUTTONS --- */
        .badge {
            background: #f5f3ff;
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
        }

        .action-btn {
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .edit-btn { background: #eef2ff; color: #4f46e5; }
        .delete-btn { background: #fef2f2; color: #ef4444; margin-left: 8px; }

        .edit-btn:hover { background: #4f46e5; color: white; }
        .delete-btn:hover { background: #ef4444; color: white; }

        .back-btn {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h2>All Assets</h2>
        <a href="/admin/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    <div class="table-card">
        <table class="styled-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Type</th>
                <th>Assigned To</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${assets}">
                <td th:text="${a.id}" style="font-weight: 600; color: var(--text-muted);"></td>
                <td th:text="${a.name}" style="font-weight: 700;"></td>
                <td th:text="${a.type}"></td>
                <td><span class="badge" th:text="${a.assignedTo}"></span></td>
                <td>
                    <a th:href="@{'/admin/edit-asset/' + ${a.id}}" class="action-btn edit-btn">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                    <a th:href="@{'/admin/delete-asset/' + ${a.id}}"
                       class="action-btn delete-btn"
                       onclick="return confirm('Delete this asset?')">
                        <i class="fas fa-trash"></i> Delete
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(assets)}">
                <td colspan="5" style="text-align: center; padding: 40px; color: var(--text-muted);">
                    No assets found in the system.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
