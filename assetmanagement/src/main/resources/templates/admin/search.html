<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search User | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --accent: #a855f7;
            --bg-lavender: #F3E8FF;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --error: #ef4444;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-lavender);
            color: var(--text-main);
        }

        .search-wrapper {
            width: 100%;
            max-width: 600px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.02em;
            margin-bottom: 3rem;
        }

        /* Search Box with Black Border */
        .search-box {
            background: #ffffff;
            padding: 10px;
            border-radius: 20px;
            display: flex;
            border: 2px solid #000000;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            border-radius: 14px;
            color: var(--text-main);
            font-weight: 600;
        }

        .search-box button {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background: var(--accent);
            transform: scale(1.02);
        }

        /* Result Card with Black Border */
        .result-card {
            margin-top: 3rem;
            background: #ffffff;
            padding: 3rem;
            border-radius: 30px;
            border: 2px solid #000000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: left;
            animation: slideUp 0.5s ease-out;
            color: var(--text-main);
        }

        .result-card h3 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.6rem;
            font-weight: 800;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f8fafc;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 800;
            color: #000000;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .detail-value {
            font-weight: 700;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .error-msg {
            margin-top: 2rem;
            padding: 1.2rem;
            background: #fff1f2;
            color: var(--error);
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.9rem;
            border: 1px solid #ffe4e6;
            text-align: center;
        }

        .back-link {
            display: block;
            margin-top: 4rem;
            text-decoration: none;
            color: #000000;
            font-weight: 800;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }
    </style>
</head>
<body>

<div class="search-wrapper">
    <h2>Find User</h2>

    <form action="/admin/search-user" method="post" class="search-box">
        <input type="text" name="userId" placeholder="Enter Employee ID (e.g. EMP-101)" required>
        <button type="submit">Search</button>
    </form>

    <div class="error-msg" th:if="${error}" th:text="${error}">
        User not found in system.
    </div>

    <div class="result-card" th:if="${user != null}">
        <h3>User Found</h3>

        <div class="detail-row">
            <span class="detail-label">Name</span>
            <span class="detail-value" th:text="${user.name}">John Doe</span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Email</span>
            <span class="detail-value" th:text="${user.email}">john@company.com</span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Role</span>
            <span class="detail-value" th:text="${user.role}" style="color: var(--primary);">EMPLOYEE</span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Employee ID</span>
            <span class="detail-value" th:text="${user.employeeId}" style="background: rgba(139, 92, 246, 0.1); padding: 4px 10px; border-radius: 8px;">EMP-101</span>
        </div>
    </div>

    <a href="/admin/dashboard" class="back-link">← Back to Dashboard</a>
</div>

</body>
</html>
