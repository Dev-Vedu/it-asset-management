<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search User | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            background-color: #f8fafc;
        }

        .search-wrapper {
            width: 100%;
            max-width: 600px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        /* Modern Search Bar */
        .search-box {
            background: white;
            padding: 8px;
            border-radius: 16px;
            display: flex;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            box-shadow: 0 20px 30px -10px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            border-radius: 12px;
        }

        .search-box button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box button:hover {
            background: var(--accent);
        }

        /* Result Card */
        .result-card {
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: left;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card h3 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.25rem;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 1rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f8fafc;
        }

        .detail-row:last-child { border-bottom: none; }

        .detail-label { font-weight: 600; color: var(--text-muted); }
        .detail-value { font-weight: 500; color: var(--text-main); }

        /* Error Message */
        .error-msg {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #fff1f2;
            color: var(--error);
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid #ffe4e6;
        }

        .back-link {
            margin-top: 2rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="search-wrapper">
    <h2>Find User</h2>

    <form action="/admin/search-user" method="post" class="search-box">
        <input type="text" name="userId" placeholder="Enter Employee ID (e.g. EMP-101)" required>
        <button type="submit">Search</button>
    </form>

    <p class="error-msg" th:if="${error}" th:text="${error}"></p>

    <div class="result-card" th:if="${user != null}">
        <h3>User Found</h3>

        <div class="detail-row">
            <span class="detail-label">Name</span>
            <span class="detail-value" th:text="${user.name}">John Doe</span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Email</span>
            <span class="detail-value" th:text="${user.email}">john@company.com</span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Role</span>
            <span class="detail-value" th:text="${user.role}">EMPLOYEE</span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Employee ID</span>
            <span class="detail-value" th:text="${user.employeeId}">EMP-101</span>
        </div>
    </div>

    <a href="/admin/dashboard" class="back-link">← Back to Dashboard</a>
</div>

</body>
</html>
