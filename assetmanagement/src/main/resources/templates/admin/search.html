<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search User | AssetPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0b0e14;
            --primary: #6d28d9;
            --accent: #a855f7;
            --bg-body: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
            --error: #ef4444;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            height: 100%;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            flex-shrink: 0;
        }

        .logo-area { padding: 0 25px 40px; }
        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .panel-title { font-size: 20px; font-weight: 800; color: white; }

        .nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .nav-links li a {
            color: #94a3b8;
            text-decoration: none;
            padding: 12px 25px;
            margin: 4px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
        }

        .nav-links li a:hover { background: #252525; color: white; }
        .nav-links li a.active { background: rgba(255, 255, 255, 0.05); color: white; }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }

        .top-bar {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid var(--border-color);
            background: white;
            flex-shrink: 0;
        }

        /* --- SEARCH AREA --- */
        .content-area {
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }

        .search-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-title h2 { font-size: 28px; font-weight: 800; color: var(--text-main); margin: 0; }
        .search-title p { color: var(--text-muted); margin-top: 5px; }

        .search-box-large {
            background: white;
            padding: 8px;
            border-radius: 20px;
            display: flex;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            transition: 0.3s;
        }

        .search-box-large:focus-within {
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(109, 40, 217, 0.1);
        }

        .search-box-large input {
            flex: 1;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            background: transparent;
        }

        .search-box-large button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 35px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-box-large button:hover { background: var(--accent); }

        /* --- RESULTS --- */
        .result-card {
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
            background: white;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            padding: 35px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar-circle {
            width: 60px;
            height: 60px;
            background: #f5f3ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
        }

        .detail-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-weight: 600;
            color: var(--text-main);
        }

        .error-msg {
            margin-top: 25px;
            color: var(--error);
            font-weight: 700;
            background: #fef2f2;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 14px;
            border: 1px solid #fee2e2;
        }

        .back-btn {
            margin-top: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .back-btn:hover { color: var(--primary); }

    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-placeholder"><i class="fas fa-cube" style="color: white;"></i></div>
            <div class="panel-title">AssetPro</div>
        </div>
        <ul class="nav-links">
            <li><a href="/admin/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/add-asset"><i class="fas fa-plus"></i> Add Asset</a></li>
            <li><a href="/admin/add-user"><i class="fas fa-user-plus"></i> Add User</a></li>
            <li><a href="/admin/search-user" class="active"><i class="fas fa-search"></i> Search User</a></li>
            <li><a href="/admin/issues"><i class="fas fa-ticket-alt"></i> View Issues</a></li>
            <li><a href="/admin/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/login" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div style="font-weight: 700; font-size: 18px;">Staff Directory</div>
        </header>

        <div class="content-area">
            <div class="search-container">
                <div class="search-title">
                    <h2>Find User Account</h2>
                    <p>Enter an ID to view employee or worker details.</p>
                </div>

                <form action="/admin/search-user" method="post" class="search-box-large">
                    <input type="text" name="userId" placeholder="Employee ID (e.g. EMP-101)" required>
                    <button type="submit">Search</button>
                </form>

                <div class="error-msg" th:if="${error}">
                    <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i>
                    <span th:text="${error}">User not found.</span>
                </div>

                <div class="result-card" th:if="${user != null}">
                    <div class="result-header">
                        <div class="avatar-circle" th:text="${#strings.substring(user.name,0,1)}">U</div>
                        <div>
                            <div style="font-size: 20px; font-weight: 800;" th:text="${user.name}">User Name</div>
                            <div style="color: var(--primary); font-weight: 700; font-size: 14px;" th:text="${user.role}">ROLE</div>
                        </div>
                    </div>

                    <div class="detail-row">
                        <span class="detail-label">Email Address</span>
                        <span class="detail-value" th:text="${user.email}">user@company.com</span>
                    </div>

                    <div class="detail-row">
                        <span class="detail-label">Employee ID</span>
                        <span class="detail-value" style="background: #f3f4f6; padding: 4px 10px; border-radius: 6px;" th:text="${user.employeeId}">EMP-000</span>
                    </div>
                </div>

                <a href="/admin/dashboard" class="back-btn"><i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Back to overview</a>
            </div>
        </div>
    </main>
</div>

</body>
</html>
