<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Worker Dashboard | AssetPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/css/worker.css}">
</head>
<body>

<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-placeholder"><i class="fas fa-chart-pie"></i> </div>
            <div class="panel-title">AssetPro</div>
        </div>
        <ul class="nav-links">
            <li><a href="/worker/dashboard" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/worker/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div class="welcome-msg">Welcome, <span th:text="${workerName != null ? workerName : 'Worker'}">Maintenance Team</span>!</div>

            <div class="top-bar-right">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="issueSearch" placeholder="Filter tasks..." onkeyup="filterTable()">
                </div>

                <div class="circle-profile"
                     th:text="${workerName != null} ? ${workerName.substring(0,1)} : 'W'"
                     title="My Profile">
                    W
                </div>
            </div>
        </header>

        <div class="content-area">
            <div style="margin-bottom: 30px;">
                <h2 style="margin: 0; font-size: 28px;">Maintenance Queue</h2>
                <p style="color: var(--text-muted); margin: 5px 0 0;">You have <span th:text="${#lists.size(issues)}" style="color: var(--primary); font-weight: 700;">0</span> assigned issues.</p>
            </div>

            <section class="stats-grid">
                <div class="stat-card assigned">
                    <div class="card-header">
                        <span>Assigned</span>
                        <i class="fas fa-tasks"></i>
                    </div>
                    <h3 th:text="${#lists.size(issues)}">0</h3>
                    <p class="card-subtitle">Assigned Tasks</p>
                </div>

                <div class="stat-card progress">
                    <div class="card-header">
                        <span>In Progress</span>
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                    <h3 th:text="${inProgressCount}">0</h3>
                    <p class="card-subtitle">Active Maintenance</p>
                </div>

                <div class="stat-card resolved" style="">
                    <div class="card-header">
                        <span>Resolved</span>
                        <i class="fas fa-check-double"></i>
                    </div>
                    <h3 th:text="${resolvedCount}">0</h3>
                    <p class="card-subtitle">Completed Tasks</p>
                </div>
            </section>

            <section class="table-card">
                <table class="styled-table" id="issueTable">
                    <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>Employee</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Update</th> <!-- message -->
                        <th style="text-align: right;">Action</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="i, stat : ${issues}">

                        <td th:text="${stat.count}">1</td>

                        <!-- Employee -->
                        <td th:text="${i.employee.employeeId}">EMP101</td>

                        <!-- Description -->
                        <td th:text="${i.description}">Issue</td>

                        <!-- Status -->
                        <td>
                            <span class="badge-pending" th:text="${i.status}">Pending</span>
                        </td>

                        <td>
                            <form th:action="@{'/worker/updateMessage/' + ${i.id}}" method="post">
                                <input type="text" name="message"
                                       placeholder="Enter update..."
                                       th:value="${i.workerMessage}"
                                       style="padding:5px; width:140px;">

                                <button type="submit" style="padding:5px;">Send</button>
                            </form>
                        </td>

                        <!-- Action -->
                        <td style="text-align: right;">
                            <a th:href="@{'/worker/update/' + ${i.id}}" class="btn-resolve">Resolve</a>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </section>

        </div>
    </main>
</div>

<script>
    function filterTable() {
        const input = document.getElementById("issueSearch");
        const filter = input.value.toLowerCase();
        const table = document.getElementById("issueTable");
        const tr = table.getElementsByTagName("tr");
        for (let i = 1; i < tr.length; i++) {
            const row = tr[i];
            row.style.display = row.textContent.toLowerCase().includes(filter) ? "" : "none";
        }
    }
</script>

</body>
</html>
