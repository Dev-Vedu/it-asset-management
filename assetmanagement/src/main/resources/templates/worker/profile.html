<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Worker Profile | AssetPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0b0e14;
            --primary: #6d28d9;
            --accent: #a855f7;
            --bg-body: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
            --success: #10b981;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            height: 100%;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            flex-shrink: 0;
        }

        .logo-area { padding: 0 25px 40px; }
        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .panel-title { font-size: 20px; font-weight: 800; color: white; }

        .nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .nav-links li a {
            color: #94a3b8;
            text-decoration: none;
            padding: 12px 25px;
            margin: 4px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
        }
        .nav-links li a:hover { background: #252525; color: white; }
        .nav-links li a.active { background: rgba(255, 255, 255, 0.05); color: white; }

        .sidebar-footer { margin-top: auto; padding: 20px 25px; border-top: 1px solid rgba(255,255,255,0.05); }
        .logout-link { color: #94a3b8; text-decoration: none; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .logout-link:hover { color: #ef4444; }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }

        .top-bar {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid var(--border-color);
            background: white;
            flex-shrink: 0;
        }

        /* --- PROFILE CARD --- */
        .content-area {
            padding: 60px 50px;
            display: flex;
            justify-content: center;
        }

        .profile-wrapper {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            background: var(--primary);
            color: white;
            border-radius: 35px; /* Squircle style */
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
        }

        .profile-name { font-size: 26px; font-weight: 800; color: #000; margin: 0; }
        .role-tag {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 16px;
            background: #f5f3ff;
            color: var(--primary);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-grid {
            margin-top: 40px;
            text-align: left;
            background: #f9fafb;
            padding: 25px;
            border-radius: 20px;
        }

        .info-row { margin-bottom: 25px; }
        .info-row:last-child { margin-bottom: 0; }

        .info-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 700;
            color: #000;
        }

        .status-active {
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-actions {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        .btn-action {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: 0.3s;
            text-align: center;
            border: none;
        }

        .btn-back { background: #; color: white; }
        .btn-back:hover { background: #5b21b6; }

        .btn-logout { background: #fee2e2; color: #ef4444; }
        .btn-logout:hover { background: #fecaca; }

    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-placeholder"><i class="fas fa-tools" style="color: white;"></i></div>
            <div class="panel-title">AssetPro</div>
        </div>
        <ul class="nav-links">
            <li><a href="/worker/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/worker/tasks"><i class="fas fa-tasks"></i> Active Tasks</a></li>
            <li><a href="/worker/profile" class="active"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div style="font-weight: 700; font-size: 18px; color: var(--text-main);">Personal Profile</div>
            <div style="color: var(--text-muted); font-size: 14px;">Field Personnel Portal</div>
        </header>

        <div class="content-area">
            <div class="profile-wrapper">
                <div class="profile-avatar"
                     th:text="${user != null and user.name != null} ? ${user.name.substring(0,1).toUpperCase()} : 'W'">W</div>

                <h2 class="profile-name" th:text="${user != null} ? ${user.name} : 'Worker Account'">Worker Name</h2>
                <div class="role-tag">Field Personnel</div>

                <div class="info-grid">
                    <div class="info-row">
                        <span class="info-label">Email Address</span>
                        <span class="info-value" th:text="${user != null} ? ${user.email} : 'worker@assetpro.com'">worker@gmail.com</span>
                    </div>

                    <div class="info-row">
                        <span class="info-label">Worker Type / Specialization</span>
                        <span class="info-value" th:text="${user != null} ? ${user.workerType} : 'General Maintenance'">Maintenance</span>
                    </div>

                    <div class="info-row">
                        <span class="info-label">Duty Status</span>
                        <span class="info-value status-active">
                            <i class="fas fa-check-circle"></i> Active / On-Duty
                        </span>
                    </div>
                </div>

                <div class="profile-actions">
                    <a href="/worker/dashboard" class="btn-action btn-back">Back to Dashboard</a>
                    <a href="/logout" class="btn-action btn-logout">Logout</a>
                </div>
            </div>
        </div>
    </main>
</div>

</body>
</html>
