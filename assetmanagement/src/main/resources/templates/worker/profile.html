<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Profile | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --bg-lavender: #F3E8FF;
            --white: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-lavender); /* Lavender Background */
            color: var(--text-main);
        }

        /* Floating White Card with Black Border */
        .profile-card {
            background: var(--white);
            width: 90%;
            max-width: 400px;
            padding: 4rem 2.5rem;
            border-radius: 35px;
            border: 2px solid #000000; /* Added Black Border */
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.12);
            text-align: center;
            animation: popIn 0.6s ease-out;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            font-weight: 800;
            border: 2px solid #000; /* Avatar Border */
        }

        h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.8rem;
            color: #000; /* Black Title */
            font-weight: 800;
        }

        .role-badge {
            display: inline-block;
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-weight: 800;
            margin-bottom: 2.5rem;
            border: 1px solid #000; /* Badge Border */
        }

        .info-box {
            background: #f8fafc;
            padding: 1.8rem;
            border-radius: 24px;
            margin-bottom: 2.5rem;
            text-align: left;
            border: 2px solid #000; /* Info Box Black Border */
        }

        .label {
            font-weight: 800;
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .value {
            color: #000;
            font-weight: 700;
            font-size: 1rem;
        }

        .status-active {
            color: #10b981;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .actions { display: flex; gap: 1rem; }

        .btn {
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0.9rem;
            border-radius: 14px;
            flex: 1;
            text-align: center;
        }

        .btn-back {
            background: #f1f5f9;
            color: #000;
            border: 2px solid #000;
        }

        .btn-logout {
            background: #000;
            color: white;
            border: 2px solid #000;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="avatar" th:text="${user != null and user.name != null} ? ${user.name.substring(0,1).toUpperCase()} : 'W'">W</div>

    <h2 th:text="${user != null} ? ${user.name} : 'Worker Account'">Worker Name</h2>
    <div class="role-badge">Field Worker</div>

    <div class="info-box">
        <div style="margin-bottom: 15px;">
            <span class="label">Email Address</span><br>
            <span class="value" th:text="${user != null} ? ${user.email} : 'worker@gmail.com'">worker@gmail.com</span>
        </div>
        <div style="margin-bottom: 15px;">
            <span class="label">Worker Type</span><br>
            <span class="value" th:text="${user != null} ? ${user.workerType} : 'Maintenance'">Maintenance</span>
        </div>
        <div>
            <span class="label">Duty Status</span><br>
            <span class="value status-active">● Active</span>
        </div>
    </div>

    <div class="actions">
        <a href="/worker/dashboard" class="btn btn-back">← Back</a>
        <a href="/logout" class="btn btn-logout">Logout</a>
    </div>
</div>

</body>
</html>
