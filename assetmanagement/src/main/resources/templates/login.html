<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | IT Asset Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent-orange: #f97316;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
            padding: 3rem 2.5rem;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            position: relative;
        }

        /* The Circular Logo Container */
        .logo-container {
            width: 90px;
            height: 90px;
            background: white;
            margin: -75px auto 1.5rem auto; /* Pulls the logo up half-way */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border: 4px solid #6366f1;
        }

        .logo-container svg {
            width: 60px;
            height: 60px;
        }

        h2 {
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-size: 1.75rem;
            font-weight: 800;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        form { text-align: left; }
        .form-group { margin-bottom: 1.2rem; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.8rem;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 0.9rem;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid #f1f5f9;
            padding-top: 1rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="45" cy="40" r="22" fill="#f97316" />
            <path d="M45 18 A22 22 0 0 1 45 62 M45 18 A8 22 0 0 1 45 62 M45 18 A8 22 0 0 0 45 62 M45 18 A22 22 0 0 0 45 62" stroke="white" stroke-width="1.5" fill="none"/>
            <line x1="23" y1="40" x2="67" y2="40" stroke="white" stroke-width="1.5" />

            <circle cx="70" cy="65" r="14" fill="#1e293b" />
            <circle cx="70" cy="65" r="5" fill="white" />
            <g fill="#1e293b">
                <rect x="67" y="48" width="6" height="6" rx="1" />
                <rect x="67" y="76" width="6" height="6" rx="1" />
                <rect x="53" y="62" width="6" height="6" rx="1" />
                <rect x="81" y="62" width="6" height="6" rx="1" />
            </g>

            <text x="45" y="85" font-family="Arial" font-size="16" font-weight="900" fill="#f97316" text-anchor="middle">IT</text>
        </svg>
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Enter your credentials to manage your assets</p>

    <form action="/login" method="post">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="admin@company.com" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
            <label style="display: flex; align-items: center; gap: 5px;">
                <input type="checkbox"> Remember me
            </label>
            <a href="#" style="color: #6366f1; text-decoration: none; font-weight: 600;">Forgot password?</a>
        </div>

        <button type="submit">Sign In</button>
    </form>

    <div class="footer">
        &copy; 2026 IT Asset Management System
    </div>
</div>

</body>
</html>
