<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Profile | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --bg-lavender: #F3E8FF;
            --white: #ffffff;
            --text-main: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-lavender);
        }

        .profile-card {
            background: var(--white);
            width: 90%;
            max-width: 400px;
            padding: 4rem 2.5rem;
            border-radius: 35px;
            border: 2px solid #000000; /* Added Black Border */
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.12);
            text-align: center;
            animation: popIn 0.6s ease-out;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            font-weight: 800;
            border: 2px solid #000; /* Added Black Border */
        }

        .role-badge {
            display: inline-block;
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-weight: 800;
            margin-bottom: 2.5rem;
            border: 1px solid #000; /* Small Black Border */
        }

        .info-box {
            background: #f8fafc;
            padding: 1.8rem;
            border-radius: 24px;
            margin-bottom: 2.5rem;
            text-align: left;
            border: 1px solid #000; /* Added Black Border */
        }

        .btn-logout {
            background: #000;
            color: white;
            padding: 0.9rem 1.8rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            flex: 1;
        }

        .btn-back {
            background: #f1f5f9;
            color: #000;
            border: 2px solid #000;
            padding: 0.9rem 1.8rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            flex: 1;
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
<div class="profile-card">
    <div class="avatar" th:text="${user != null and user.name != null} ? ${user.name.substring(0,1).toUpperCase()} : 'E'">E</div>
    <h2 th:text="${user.name}" style="color: #000; font-weight: 800;">Employee Name</h2>
    <div class="role-badge" th:text="${user.role}">Employee</div>
    <div class="info-box">
        <div style="margin-bottom: 15px;">
            <small style="text-transform: uppercase; font-weight: 800; color: #64748b;">Email Address</small><br>
            <b th:text="${user.email}">email@example.com</b>
        </div>
        <div>
            <small style="text-transform: uppercase; font-weight: 800; color: #64748b;">Employee ID</small><br>
            <b th:text="${user.employeeId}">EMP-001</b>
        </div>
    </div>
    <div style="display: flex; gap: 10px;">
        <a href="/employee/dashboard" class="btn-back">← Back</a>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>
</div>
</body>
</html>
