<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Profile | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <style>
        :root {
    --primary: #6366f1;
    --accent: #a855f7;
    --bg-color: #f8fafc;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --white: rgba(255, 255, 255, 0.9);
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    /* Premium Animated Mesh Background */
    background: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.12) 0px, transparent 50%);
    background-color: #f8fafc;
}

.profile-card {
    background: var(--white);
    backdrop-filter: blur(15px);
    width: 90%;
    max-width: 400px;
    padding: 3rem 2rem;
    border-radius: 30px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.7);
    text-align: center;
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

.avatar {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 50%;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 2.5rem;
    font-weight: 700;
    box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    text-transform: uppercase;
}

h2 {
    margin: 0 0 0.5rem 0;
    font-size: 1.6rem;
    color: var(--text-main);
    font-weight: 800;
}

.role-badge {
    display: inline-block;
    background: #e0e7ff;
    color: #4338ca;
    padding: 0.3rem 1rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 2rem;
    text-transform: uppercase;
}

.info-box {
    background: rgba(241, 245, 249, 0.5);
    padding: 1.5rem;
    border-radius: 20px;
    margin-bottom: 2rem;
    text-align: left;
    border: 1px solid #e2e8f0;
}

.info-item {
    display: flex;
    flex-direction: column; /* Stacked for better readability on mobile */
    margin-bottom: 1rem;
}

.info-item:last-child { margin-bottom: 0; }

.label {
    font-weight: 600;
    color: var(--text-muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    margin-bottom: 2px;
}

.value {
    color: var(--text-main);
    font-weight: 600;
    font-size: 1rem;
    word-break: break-all;
}

.actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
}

.actions a {
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 0.8rem 1.5rem;
    border-radius: 14px;
    transition: all 0.3s ease;
}

.btn-back {
    background: #f1f5f9;
    color: var(--text-main);
}

.btn-back:hover {
    background: #e2e8f0;
    transform: translateX(-5px);
}

.btn-logout {
    background: #fef2f2;
    color: #ef4444;
}

.btn-logout:hover {
    background: #fee2e2;
}
    </style>
</head>
<body>

<div class="profile-card">
    <div class="avatar" th:text="${user.name.substring(0,1)}">E</div>

    <h2 th:text="${user.name}">Employee Name</h2>
    <div class="role-badge" th:text="${user.role}">ROLE</div>

    <div class="info-box">
        <div class="info-item">
            <span class="label">Email:</span>
            <span class="value" th:text="${user.email}">email@example.com</span>
        </div>
        <div class="info-item">
            <span class="label">Employee ID:</span>
            <span class="value" th:text="${user.employeeId}">EMP-001</span>
        </div>
        <div class="info-item">
            <span class="label">Account Status:</span>
            <span class="value" style="color: #10b981;">● Active</span>
        </div>
    </div>

    <div class="actions">
        <a href="/employee/dashboard" class="btn-back">&larr; Back</a>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>
</div>

</body>
</html>
