<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report Issue | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F3E8FF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .form-card {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 3.5rem 3rem;
            border-radius: 32px;
            border: 2px solid #000000; /* Card keeps the Black Border */
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.12);
            animation: slideUp 0.6s ease-out;
        }

        h2 {
            color: #8b5cf6;
            font-weight: 800;
            font-size: 2.2rem;
            text-align: center;
            margin-top: 0;
        }

        p.subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: #000;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
        }

        input[type="text"], select {
            width: 100%;
            padding: 1.1rem;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* Updated Button Style: Removed Black Border */
        button {
            width: 100%;
            background: #8b5cf6;
            color: white;
            border: none; /* Removed the black border */
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2);
        }

        button:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(139, 92, 246, 0.3);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            text-decoration: none;
            color: #64748b;
            font-weight: 700;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #8b5cf6;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="form-card">
    <h2>Report Issue</h2>
    <p class="subtitle">Please provide details about the problem.</p>
    <form th:action="@{/employee/report-issue}" method="post">
        <div class="form-group">
            <label>Description</label>
            <input type="text" name="description" placeholder="e.g. Screen flickering" required>
        </div>

        <div class="form-group">
            <label>Issue Type</label>
            <select name="type">
                <option value="HARDWARE">Hardware</option>
                <option value="SOFTWARE">Software</option>
                <option value="NETWORK">Network</option>
            </select>
        </div>

        <button type="submit">Submit Issue</button>
    </form>
    <a href="/employee/dashboard" class="back-link">← Back to Dashboard</a>
</div>
</body>
</html>
