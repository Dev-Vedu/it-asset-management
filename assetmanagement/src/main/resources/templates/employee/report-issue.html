<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report Issue | AssetPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0b0e14;
            --primary: #6d28d9;
            --accent: #a855f7;
            --bg-body: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            height: 100%;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            flex-shrink: 0;
        }

        .logo-area { padding: 0 25px 40px; }
        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .panel-title { font-size: 20px; font-weight: 800; color: white; }

        .nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .nav-links li a {
            color: #94a3b8;
            text-decoration: none;
            padding: 12px 25px;
            margin: 4px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
        }

        .nav-links li a:hover { background: #252525; color: white; }
        .nav-links li a.active { background: rgba(255, 255, 255, 0.1); color: white; }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }

        .top-bar {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid var(--border-color);
            background: white;
            flex-shrink: 0;
        }

        .content-area {
            padding: 50px;
            display: flex;
            justify-content: center;
        }

        /* --- FORM CARD --- */
        .form-card {
            background: white;
            padding: 50px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-card h2 {
            margin: 0 0 10px 0;
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
        }

        .form-card p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            background: #f9fafb;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 15px -3px rgba(109, 40, 217, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 20px 25px -5px rgba(109, 40, 217, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        .back-link:hover { color: var(--primary); }

    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-placeholder"><i class="fas fa-cube" style="color: white;"></i></div>
            <div class="panel-title">AssetPro</div>
        </div>
        <ul class="nav-links">
            <li><a href="/employee/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/employee/report-issue" class="active"><i class="fas fa-exclamation-circle"></i> Report Issue</a></li>
            <li><a href="/employee/my-issues" class="active"><i class="fas fa-list-ul"></i> My Issues</a></li>
            <li><a href="/employee/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer" style="padding: 20px 25px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto;">
            <a href="/logout" style="color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div style="font-weight: 700; font-size: 18px;">Support Center</div>
            <div style="color: var(--text-muted); font-size: 14px;">Ticket System v1.0</div>
        </header>

        <div class="content-area">
            <div class="form-card">
                <h2>Report Issue</h2>
                <p>Provide details about the technical problem you're experiencing.</p>

                <form th:action="@{/employee/report-issue}" method="post">
                    <div class="form-group">
                        <label>Short Description</label>
                        <input type="text" name="description" placeholder="e.g. Keyboard keys not responding" required>
                    </div>

                    <div class="form-group">
                        <label>Issue Category</label>
                        <select name="type">
                            <option value="HARDWARE">Hardware Problem</option>
                            <option value="SOFTWARE">Software Glitch</option>
                            <option value="NETWORK">Network / Wi-Fi</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-submit">Submit Support Ticket</button>
                </form>

                <a href="/employee/dashboard" class="back-link">Discard and return</a>
            </div>
        </div>
    </main>
</div>

</body>
</html>
