<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Issues | AssetPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0b0e14;
            --primary: #6d28d9;
            --accent: #a855f7;
            --bg-body: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
            --success: #10b981;
            --warning: #f59e0b;
        }

        html, body {
            margin: 0; padding: 0; height: 100vh;
            overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
        }

        .dashboard-container { display: flex; height: 100vh; width: 100vw; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg);
            height: 100%; color: white; display: flex;
            flex-direction: column; padding: 30px 0; flex-shrink: 0;
        }

        .logo-area { padding: 0 25px 40px; }
        .logo-placeholder {
            width: 40px; height: 40px; background: var(--primary);
            border-radius: 10px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
        }
        .panel-title { font-size: 20px; font-weight: 800; color: white; }

        .nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .nav-links li a {
            color: #94a3b8; text-decoration: none; padding: 12px 25px;
            margin: 4px 15px; display: flex; align-items: center;
            gap: 12px; border-radius: 12px; font-weight: 600;
        }

        .nav-links li a:hover { background: #252525; color: white; }
        .nav-links li a.active { background: rgba(255, 255, 255, 0.1); color: white; }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1; display: flex; flex-direction: column;
            height: 100vh; overflow-y: auto;
        }

        .top-bar {
            height: 80px; display: flex; justify-content: space-between;
            align-items: center; padding: 0 50px;
            border-bottom: 1px solid var(--border-color); background: white;
        }

        .content-area { padding: 50px; }

        .page-header { margin-bottom: 30px; }
        .page-header h2 { margin: 0; font-size: 28px; font-weight: 800; color: var(--text-main); }
        .page-header p { color: var(--text-muted); margin-top: 5px; }

        /* --- TABLE CARD --- */
        .table-card {
            background: white; border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        .styled-table {
            width: 100%; border-collapse: collapse; text-align: left;
        }

        .styled-table th {
            background: #fafafa; padding: 18px 25px;
            font-size: 13px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        .styled-table td {
            padding: 18px 25px; font-size: 15px;
            color: var(--text-main); border-bottom: 1px solid var(--border-color);
        }

        .styled-table tr:last-child td { border-bottom: none; }

        /* --- STATUS BADGES --- */
        .badge {
            padding: 6px 12px; border-radius: 8px;
            font-size: 12px; font-weight: 700; display: inline-block;
        }
        .status-pending { background: #fffbeb; color: #d97706; }
        .status-resolved { background: #ecfdf5; color: #10b981; }
        .status-default { background: #f3f4f6; color: var(--text-muted); }

        .empty-state {
            padding: 50px; text-align: center; color: var(--text-muted);
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 20px 25px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-bottom:20px; }

        .logout-link {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .logout-link:hover { color: #ef4444; }

    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-placeholder"><i class="fas fa-cube" style="color: white;"></i></div>
            <div class="panel-title">AssetPro</div>
        </div>
        <ul class="nav-links">
            <li><a href="/employee/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/employee/report-issue"><i class="fas fa-exclamation-circle"></i> Report Issue</a></li>
            <li><a href="/employee/my-issues" class="active"><i class="fas fa-list-ul"></i> My Issues</a></li>
            <li><a href="/employee/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div style="font-weight: 700; font-size: 18px;">Ticket History</div>
            <div style="color: var(--text-muted); font-size: 14px;">Total Issues: <span th:text="${#lists.size(issues)}">0</span></div>
        </header>

        <div class="content-area">
            <div class="page-header">
                <h2>My Reported Issues</h2>
                <p>Track the status of your support requests.</p>
            </div>

            <div class="table-card">
                <table class="styled-table">
                    <thead>
                    <tr>
                        <th style="width: 80px;">#</th>
                        <th>Description</th>
                        <th style="width: 150px;">Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="i, stat : ${issues}">
                        <td th:text="${stat.count}" style="font-weight: 600; color: var(--text-muted);"></td>
                        <td th:text="${i.description}" style="font-weight: 600;"></td>
                        <td>
                            <!-- STATUS BADGE -->
                            <span th:if="${i.status == 'PENDING'}" class="badge status-pending">
        <i class="fas fa-clock"></i> Pending
    </span>

                            <span th:if="${i.status == 'RESOLVED'}" class="badge status-resolved">
        <i class="fas fa-check-circle"></i> Resolved
    </span>

                            <span th:if="${i.status != 'PENDING' && i.status != 'RESOLVED'}"
                                  class="badge status-default"
                                  th:text="${i.status}">
    </span>

                            <div style="margin-top:6px; font-size:13px; color:#6b7280;"><span th:text="${#strings.isEmpty(i.workerMessage) ? 'No update yet' : i.workerMessage}">
</span>

                            </div>
                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(issues)}">
                        <td colspan="3" class="empty-state">
                            <i class="fas fa-folder-open" style="font-size: 30px; margin-bottom: 10px; display: block;"></i>
                            No issues reported yet.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

</body>
</html>
