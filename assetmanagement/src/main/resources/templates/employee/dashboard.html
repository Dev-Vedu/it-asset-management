<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard | AssetPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0b0e14; /* Same as Admin */
            --primary: #6d28d9;    /* Same as Admin */
            --accent: #a855f7;
            --bg-body: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #f3f4f6;
        }

        /* --- PREVENT GLOBAL SCROLL --- */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            height: 100%;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            flex-shrink: 0;
        }

        .logo-area { padding: 0 25px 40px; }
        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .panel-title { font-size: 20px; font-weight: 800; color: white; }

        .nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .nav-links li a {
            color: #94a3b8;
            text-decoration: none;
            padding: 12px 25px;
            margin: 4px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
        }

        .nav-links li a.active { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-links li a:hover { background: #252525; }

        .sidebar-footer { margin-top: auto; padding: 20px 25px; border-top: 1px solid rgba(255,255,255,0.05); }
        .logout-link {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .logout-link:hover { color: #ef4444; }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- TOP BAR --- */
        .top-bar {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid var(--border-color);
            background: #F3E8FF; /* Same Admin Purple Tint */
            flex-shrink: 0;
        }

        .welcome-msg { font-weight: 700; font-size: 20px; }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px 12px 50px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: #f9fafb;
            outline: none;
            font-family: inherit;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .search-container input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1);
        }

        .user-profile-mini {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e2e8f0;
            overflow: hidden;
            margin-left: 20px;
            background-image: url('css/images/profileimage.jpg');
            background-size: cover;
        }

        /* --- CONTENT BODY --- */
        .content-area {
            flex-grow: 1;
            padding: 40px 50px;
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }

        .stat-card span { color: var(--text-muted); font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .stat-card h3 { margin: 10px 0 0; font-size: 36px; font-weight: 800; color: var(--primary); }

        /* --- TABLE --- */
        .table-card {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }

        .styled-table { width: 100%; border-collapse: collapse; }
        .styled-table th {
            background: #fafafa;
            padding: 20px 25px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }

        .styled-table td { padding: 20px 25px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .badge { background: #f5f3ff; color: var(--primary); padding: 6px 14px; border-radius: 8px; font-weight: 700; font-size: 12px; }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-placeholder"><i class="fas fa-user-circle" style="color: white;"></i></div>
            <div class="panel-title">AssetPro</div>
        </div>
        <ul class="nav-links">
            <li><a href="/employee/dashboard" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/employee/report-issue"><i class="fas fa-exclamation-circle"></i> Report Issue</a></li>
            <li><a href="/employee/my-issues" class="active"><i class="fas fa-list-ul"></i> My Issues</a></li>
            <li><a href="/employee/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div class="welcome-msg">Welcome, <span th:text="${user.name}">Employee</span>!</div>

            <div style="display: flex; align-items: center;">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="assetSearch" placeholder="Search my assets..." onkeyup="filterTable()">
                </div>
                <div class="user-profile-mini"></div>
            </div>
        </header>

        <div class="content-area">
            <div style="margin-bottom: 30px;">
                <h2 style="margin: 0; font-size: 28px;">Employee Dashboard</h2>
                <p style="color: var(--text-muted); margin: 5px 0 0;">You have <span th:text="${#lists.size(assets)}" style="color: var(--primary); font-weight: 700;">0</span> active assets.</p>
            </div>

            <section class="stats-grid">
                <div class="stat-card">
                    <span>Your Assets</span>
                    <h3 th:text="${#lists.size(assets)}">0</h3>
                </div>
                <div class="stat-card">
                    <span>Issues Reported</span>
                    <h3 style="color: var(--accent);" th:text="${totalIssues}">0</h3>
                </div>

                <div class="stat-card">
                    <span>Pending</span>
                    <h3 style="color: #ef4444;" th:text="${pendingIssues}">0</h3>
                </div>
            </section>

            <section class="table-card">
                <table class="styled-table" id="assetTable">
                    <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>Asset Name</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a, stat : ${assets}">
                        <td th:text="${stat.count}">1</td>
                        <td style="font-weight: 700;" th:text="${a.name}">Laptop</td>
                        <td><span class="badge">Assigned</span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(assets)}">
                        <td colspan="3" class="empty-state">No assets currently assigned.</td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>
</div>

<script>
    function filterTable() {
        const input = document.getElementById("assetSearch");
        const filter = input.value.toLowerCase();
        const table = document.getElementById("assetTable");
        const tr = table.getElementsByTagName("tr");
        for (let i = 1; i < tr.length; i++) {
            const row = tr[i];
            row.style.display = row.textContent.toLowerCase().includes(filter) ? "" : "none";
        }
    }
</script>

</body>
</html>
